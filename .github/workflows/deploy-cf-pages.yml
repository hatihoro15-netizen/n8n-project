name: Deploy CF Pages

on:
  push:
    branches:
      - feature/web-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: packages/frontend
        run: npm ci

      - name: Build with @cloudflare/next-on-pages
        working-directory: packages/frontend
        env:
          NEXT_PUBLIC_API_URL: https://api-n8n.xn--9g4bn4fm2bl2mb9f.com
        run: npx @cloudflare/next-on-pages

      - name: Deploy to Cloudflare Pages
        working-directory: packages/frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy .vercel/output/static --project-name=n8n-project --branch=main
